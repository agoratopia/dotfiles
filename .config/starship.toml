"$schema" = 'https://starship.rs/config-schema.json'

palette = 'kanagawa_dragon'

format = """
$directory$git_branch$git_status$golang$rust$python$lua$fill$cmd_duration
$character"""

[palettes.kanagawa_dragon]
fg = '#c5c9c5'
muted = '#727169'
green = '#8a9a7b'
aqua = '#8ea4a2'
yellow = '#e6c384'
red = '#c4746e'
blue = '#8ba4b0'
violet = '#a292a3'

[directory]
style = 'bold blue'
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = ''
style = 'violet'
format = '[on](muted) [$symbol$branch]($style) '

[git_status]
style = 'yellow'
format = '[$all_status$ahead_behind]($style) '

[golang]
symbol = ''
style = 'aqua'
format = '[$symbol$version]($style) '

[rust]
symbol = ''
style = 'red'
format = '[$symbol$version]($style) '

[python]
symbol = ''
style = 'green'
format = '[$symbol$version]($style) '

[lua]
symbol = ''
style = 'blue'
format = '[$symbol$version]($style) '

[fill]
symbol = ' '

[cmd_duration]
min_time = 2000
style = 'muted'
format = '[$duration]($style) '

[character]
success_symbol = '[❯](green)'
error_symbol = '[❯](red)'
